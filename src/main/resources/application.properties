spring.application.name=myinventory

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/myinventory}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.url=${DB_URL:jdbc:mysql://localhost:3306/myinventory}
spring.flyway.user=${DB_USER:root}
spring.flyway.password=${DB_PASSWORD}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# Logs temporales para verificar Flyway
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG